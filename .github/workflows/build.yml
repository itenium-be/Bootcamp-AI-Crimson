name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Itenium.SkillForge/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Authenticate to GitHub Packages
        run: dotnet nuget update source itenium --username laoujin --password ${{ secrets.NUGET_AUTH_TOKEN }} --store-password-in-clear-text

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Format check
        run: dotnet format --verify-no-changes --no-restore

      - name: Test
        run: |
          dotnet test --no-build --verbosity normal --logger "trx;LogFileName=results.trx" 2>&1 | tee test-output.txt || true
          # Aggregate ALL TRX files (one per test project)
          TOTAL_PASSED=0
          TOTAL_FAILED=0
          while IFS= read -r RESULT; do
            P=$(grep -oP '<Counters[^>]*passed="\K[0-9]+' "$RESULT" | head -1)
            F=$(grep -oP '<Counters[^>]*failed="\K[0-9]+' "$RESULT" | head -1)
            TOTAL_PASSED=$((TOTAL_PASSED + ${P:-0}))
            TOTAL_FAILED=$((TOTAL_FAILED + ${F:-0}))
          done < <(find . -name "*.trx" -type f)
          if [ "$TOTAL_PASSED" -eq 0 ] && [ "$TOTAL_FAILED" -eq 0 ]; then
            # Fallback: parse console output summary line
            TOTAL_PASSED=$(grep -oP 'Passed:\s*\K[0-9]+' test-output.txt | awk '{s+=$1} END {print s+0}')
            TOTAL_FAILED=$(grep -oP 'Failed:\s*\K[0-9]+' test-output.txt | awk '{s+=$1} END {print s+0}')
          fi
          TOTAL=$((TOTAL_PASSED + TOTAL_FAILED))
          echo "{\"passed\":$TOTAL_PASSED,\"failed\":$TOTAL_FAILED,\"total\":$TOTAL}" > test-results.json
          [ "$TOTAL_FAILED" -eq 0 ] || exit 1

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: Itenium.SkillForge/backend/test-results.json

      - name: Vulnerability scan
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee /dev/stderr | grep -q "no vulnerable packages" || (echo "::error::Vulnerable packages found" && exit 1)

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Itenium.SkillForge/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Authenticate to GitHub Packages
        run: |
          echo "@itenium-forge:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NUGET_AUTH_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: bun install

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Check unused code
        run: bun run knip

      - name: Type check
        run: bun run typecheck

      - name: Unit tests
        run: |
          bun run test 2>&1 | tee unit-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          # Strip ANSI codes then parse Vitest summary: "Tests  X passed" line (not "Test Files  X passed")
          PLAIN=$(sed 's/\x1b\[[0-9;]*m//g' unit-output.txt)
          PASSED=$(echo "$PLAIN" | grep -P '^\s+Tests\s+' | grep -oP '\d+(?=\s+passed)' | head -1)
          FAILED=$(echo "$PLAIN" | grep -P '^\s+Tests\s+' | grep -oP '\d+(?=\s+failed)' | head -1)
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          TOTAL=$((PASSED + FAILED))
          echo "{\"passed\":$PASSED,\"failed\":$FAILED,\"total\":$TOTAL}" > unit-test-results.json
          exit $EXIT_CODE

      - name: Build
        run: bun run build

      - name: Vulnerability scan
        run: bun audit --production || true

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          bun run test:e2e 2>&1 | tee e2e-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          # Parse Playwright output: "X passed" "Y failed"
          PASSED=$(grep -oP '\d+(?=\s+passed)' e2e-output.txt | head -1)
          FAILED=$(grep -oP '\d+(?=\s+failed)' e2e-output.txt | head -1)
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          TOTAL=$((PASSED + FAILED))
          echo "{\"passed\":$PASSED,\"failed\":$FAILED,\"total\":$TOTAL}" > e2e-test-results.json
          exit $EXIT_CODE
        env:
          NUGET_USER: ${{ github.actor }}
          NUGET_TOKEN: ${{ secrets.NUGET_AUTH_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: |
            Itenium.SkillForge/frontend/unit-test-results.json
            Itenium.SkillForge/frontend/e2e-test-results.json
